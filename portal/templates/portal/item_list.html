{% extends 'base.html' %}{% block content %}<h2 class="mb-3">Browse Items</h2>
<form class="row g-2 mb-4">
<div class="col-md-3"><input class="form-control" name="q" placeholder="Search"></div>
<div class="col-md-2"><select class="form-select" name="type"><option value="">All Types</option><option value="LOST">Lost</option><option value="FOUND">Found</option></select></div>
<div class="col-md-3"><select class="form-select" name="category"><option value="">All Categories</option>{% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
<div class="col-md-3"><input class="form-control" name="location" placeholder="Location"></div>
<div class="col-md-1"><button class="btn btn-dark w-100">Go</button></div>
</form>
<div class="row g-4">{% for item in items %}<div class="col-md-4">{% include 'portal/partials/item_card.html' %}</div>{% empty %}<p>No matching items found.</p>{% endfor %}</div>{% endblock %}
